<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <!-- Nodo central -->
  <circle cx="50" cy="50" r="8" fill="#d87d3e" stroke="#1f1b17" stroke-width="1.5"/>
  
  <!-- Nodos periféricos -->
  <circle cx="25" cy="30" r="6" fill="#0f8b7c" stroke="#1f1b17" stroke-width="1.5"/>
  <circle cx="75" cy="30" r="6" fill="#0f8b7c" stroke="#1f1b17" stroke-width="1.5"/>
  <circle cx="25" cy="70" r="6" fill="#0f8b7c" stroke="#1f1b17" stroke-width="1.5"/>
  <circle cx="75" cy="70" r="6" fill="#0f8b7c" stroke="#1f1b17" stroke-width="1.5"/>
  
  <!-- Líneas de conexión -->
  <line x1="50" y1="50" x2="25" y2="30" stroke="#d87d3e" stroke-width="2" opacity="0.7"/>
  <line x1="50" y1="50" x2="75" y2="30" stroke="#d87d3e" stroke-width="2" opacity="0.7"/>
  <line x1="50" y1="50" x2="25" y2="70" stroke="#d87d3e" stroke-width="2" opacity="0.7"/>
  <line x1="50" y1="50" x2="75" y2="70" stroke="#d87d3e" stroke-width="2" opacity="0.7"/>
  
  <!-- Decoración: pequeños puntos en las líneas -->
  <circle cx="37" cy="40" r="2" fill="#d87d3e" opacity="0.5"/>
  <circle cx="63" cy="40" r="2" fill="#d87d3e" opacity="0.5"/>
  <circle cx="37" cy="60" r="2" fill="#d87d3e" opacity="0.5"/>
  <circle cx="63" cy="60" r="2" fill="#d87d3e" opacity="0.5"/>
</svg>
